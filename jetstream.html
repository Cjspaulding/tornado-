<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Jetstream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sky1: #d0eaf8;
      --sky2: #e8f5fd;
      --sky3: #f5faff;
      --white: #ffffff;
      --card-shadow: 0 2px 16px rgba(0,80,160,0.08), 0 1px 4px rgba(0,80,160,0.05);
      --card-shadow-hover: 0 8px 32px rgba(0,80,160,0.13), 0 2px 8px rgba(0,80,160,0.07);
      --text: #1a2332;
      --text2: #4a5c72;
      --text3: #8a9bb0;
      --border: rgba(0,80,160,0.08);
      --accent: #0077cc;
      --sun: #f59e0b;
      --rain: #3b82f6;
      --snow: #93c5fd;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 40%, var(--sky3) 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── CLOUDS ── */
    .clouds {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 200px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.55);
      border-radius: 50px;
      filter: blur(2px);
    }

    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .c1 { width: 180px; height: 50px; top: 30px; left: -20px; animation: drift 55s linear infinite; }
    .c1::before { width: 80px; height: 70px; top: -35px; left: 25px; }
    .c1::after  { width: 60px; height: 55px; top: -25px; left: 85px; }

    .c2 { width: 240px; height: 60px; top: 55px; left: 30%; animation: drift 75s linear infinite; opacity: 0.4; }
    .c2::before { width: 100px; height: 80px; top: -45px; left: 40px; }
    .c2::after  { width: 80px; height: 65px; top: -35px; left: 130px; }

    .c3 { width: 160px; height: 42px; top: 20px; left: 65%; animation: drift 65s linear infinite; opacity: 0.35; }
    .c3::before { width: 70px; height: 60px; top: -30px; left: 20px; }
    .c3::after  { width: 55px; height: 48px; top: -22px; left: 75px; }

    @keyframes drift { from { transform: translateX(0); } to { transform: translateX(110vw); } }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(220, 238, 250, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #5bc0f8, #0077cc);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(0,119,204,0.3);
    }

    .brand-text { line-height: 1.2; }

    .brand-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand-sub {
      font-size: 10px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
    }

    .header-actions { display: flex; align-items: center; gap: 10px; }

    .countdown-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      background: rgba(255,255,255,0.7);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      display: none;
    }

    @media (min-width: 480px) { .countdown-badge { display: block; } }

    .refresh-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,119,204,0.3);
    }

    .refresh-btn:hover { background: #005fa3; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,119,204,0.4); }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATUS BAR ── */
    .status-bar {
      padding: 7px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      background: rgba(220,238,250,0.5);
      border-bottom: 1px solid rgba(255,255,255,0.5);
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 50% { opacity:0.7; box-shadow: 0 0 0 4px rgba(34,197,94,0); } }

    /* ── SUMMARY BAR ── */
    .summary-bar {
      position: relative;
      z-index: 10;
      padding: 12px 16px;
    }

    .summary-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    .summary-scroll::-webkit-scrollbar { display: none; }

    .summary-pill {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 40px;
      padding: 7px 14px 7px 10px;
      box-shadow: 0 1px 6px rgba(0,80,160,0.08);
      cursor: pointer;
      transition: all 0.2s;
    }

    .summary-pill:hover { background: rgba(255,255,255,0.9); transform: translateY(-1px); }

    .sum-icon { font-size: 18px; line-height: 1; }

    .sum-info { line-height: 1.2; }

    .sum-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .sum-temp {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
    }

    /* ── MAIN GRID ── */
    main {
      position: relative;
      z-index: 10;
      padding: 4px 14px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 580px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1000px) { .grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── CARD ── */
    .card {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: box-shadow 0.3s, transform 0.3s;
      animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card:hover {
      box-shadow: var(--card-shadow-hover);
      transform: translateY(-2px);
    }

    /* Card weather tints */
    .card.clear   { background: linear-gradient(145deg, rgba(255,252,240,0.88) 0%, rgba(255,255,255,0.82) 50%); }
    .card.cloudy  { background: linear-gradient(145deg, rgba(240,245,252,0.88) 0%, rgba(255,255,255,0.82) 50%); }
    .card.rainy   { background: linear-gradient(145deg, rgba(235,245,255,0.88) 0%, rgba(255,255,255,0.82) 50%); }
    .card.snowy   { background: linear-gradient(145deg, rgba(240,248,255,0.88) 0%, rgba(255,255,255,0.82) 50%); }
    .card.stormy  { background: linear-gradient(145deg, rgba(240,240,248,0.88) 0%, rgba(255,255,255,0.82) 50%); }
    .card.foggy   { background: linear-gradient(145deg, rgba(242,244,248,0.88) 0%, rgba(255,255,255,0.82) 50%); }

    /* ── CARD TOP ── */
    .card-top {
      padding: 18px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .location-info {}

    .location-name {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .location-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      margin-top: 3px;
    }

    .card-weather-icon { font-size: 44px; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.1)); }

    /* ── TEMP HERO ── */
    .temp-hero {
      padding: 10px 20px 14px;
      display: flex;
      align-items: flex-start;
      gap: 2px;
    }

    .temp-big {
      font-size: 72px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .temp-sym {
      font-size: 28px;
      font-weight: 400;
      color: var(--text3);
      margin-top: 10px;
    }

    .temp-side {
      margin-left: 10px;
      padding-top: 14px;
    }

    .desc-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
    }

    .feels-text {
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
    }

    .stat-cell {
      background: rgba(255,255,255,0.6);
      padding: 11px 14px;
      text-align: center;
    }

    .stat-cell:first-child { border-radius: 0; }

    .sc-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      margin-bottom: 5px;
    }

    .sc-value {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .sc-unit {
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
    }

    .sc-sub {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text3);
      margin-top: 3px;
    }

    .stats-row2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
    }

    /* ── FORECAST ── */
    .forecast-section {
      padding: 14px 18px 16px;
      border-top: 1px solid var(--border);
    }

    .forecast-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text3);
      margin-bottom: 12px;
    }

    .forecast-strip {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      margin: 0 -2px;
    }

    .forecast-strip::-webkit-scrollbar { display: none; }

    .fc-day {
      flex: 1 0 0;
      min-width: 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 6px 4px;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .fc-day:hover { background: rgba(0,119,204,0.06); }

    .fc-day.today { background: rgba(0,119,204,0.08); }

    .fc-name {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text3);
      text-transform: uppercase;
    }

    .fc-day.today .fc-name { color: var(--accent); font-weight: 500; }

    .fc-icon { font-size: 18px; }

    .fc-hi {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .fc-lo {
      font-size: 11px;
      color: var(--text3);
      margin-top: -2px;
    }

    .fc-precip {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--rain);
    }

    /* ── SKELETON ── */
    .skel-wrap { padding: 18px 20px; }

    .skel {
      border-radius: 8px;
      background: linear-gradient(90deg, #e8f0f8 25%, #f0f6fb 50%, #e8f0f8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      margin-bottom: 10px;
    }

    @keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }

    /* ── ERROR ── */
    .error-wrap {
      padding: 28px 20px;
      text-align: center;
    }

    .error-icon { font-size: 28px; margin-bottom: 8px; }

    .error-text {
      font-size: 12px;
      color: #ef4444;
      font-family: 'DM Mono', monospace;
    }

    /* ── ADD LOCATION BUTTON ── */
    .add-loc-btn {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,119,204,0.1);
      border: 1.5px dashed rgba(0,119,204,0.35);
      border-radius: 40px;
      padding: 7px 14px 7px 10px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      white-space: nowrap;
    }
    .add-loc-btn:hover { background: rgba(0,119,204,0.16); border-color: var(--accent); }

    /* ── REMOVE BUTTON ── */
    .remove-btn {
      position: absolute;
      top: 12px; right: 12px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.06);
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--text3);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      opacity: 0;
    }
    .card:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: rgba(239,68,68,0.15); color: #ef4444; }
    .card-top { position: relative; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10,30,60,0.35);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    @media (min-width: 540px) { .modal-overlay { align-items: center; } }

    .modal {
      background: #fff;
      border-radius: 24px 24px 0 0;
      width: 100%; max-width: 480px;
      padding: 24px 20px 36px;
      transform: translateY(30px);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 -8px 40px rgba(0,80,160,0.15);
      position: relative;
    }
    @media (min-width: 540px) { .modal { border-radius: 24px; transform: scale(0.95); } .modal-overlay.open .modal { transform: scale(1); } }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle { width: 36px; height: 4px; background: #e0e8f0; border-radius: 2px; margin: 0 auto 20px; }
    @media (min-width: 540px) { .modal-handle { display: none; } }

    .modal-title { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; color: var(--text); margin-bottom: 16px; }

    .search-wrap { position: relative; margin-bottom: 12px; }

    .search-input {
      width: 100%; padding: 12px 44px 12px 16px;
      border: 1.5px solid var(--border); border-radius: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px;
      color: var(--text); background: #f5f9ff; outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); background: #fff; }
    .search-input::placeholder { color: var(--text3); }
    .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }

    .search-results { border-radius: 14px; overflow: hidden; border: 1px solid var(--border); max-height: 260px; overflow-y: auto; }

    .search-result {
      padding: 12px 16px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.15s; border-bottom: 1px solid var(--border);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: #f0f7ff; }

    .sr-icon { font-size: 20px; }
    .sr-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .sr-sub { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
    .sr-unit { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(0,119,204,0.08); padding: 2px 8px; border-radius: 20px; }

    .search-empty { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }
    .search-loading { padding: 20px; text-align: center; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 12px; }

    .modal-close {
      position: absolute; top: 20px; right: 20px;
      width: 30px; height: 30px; border-radius: 50%;
      background: #f0f4f8; border: none; cursor: pointer;
      font-size: 14px; color: var(--text2);
      display: flex; align-items: center; justify-content: center;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      padding: 20px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text3);
      border-top: 1px solid rgba(0,80,160,0.06);
      background: rgba(220,238,250,0.3);
      line-height: 1.9;
    }
  </style>
</head>
<body>

<!-- Animated sky clouds -->
<div class="clouds">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>

<header>
  <div class="brand">
    <div class="brand-icon">🌬️</div>
    <div class="brand-text">
      <div class="brand-name">Jetstream</div>
      <div class="brand-sub">Weather Monitor</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="countdown-badge" id="countdown"></div>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
      <span id="refresh-icon">↺</span> Refresh
    </button>
  </div>
</header>

<div class="status-bar">
  <div class="live-pill">
    <div class="live-dot"></div>
    <span>Live · Open-Meteo · Auto-refresh 10 min</span>
  </div>
  <div id="last-updated">Loading…</div>
</div>

<!-- Quick summary strip -->
<div class="summary-bar">
  <div class="summary-scroll" id="summary-scroll">
    <!-- Injected by JS -->
  </div>
</div>

<main>
  <div class="grid" id="weather-grid"></div>
</main>

<footer>
  Weather data: Open-Meteo API (open-source, no API key required) · Updates every 10 minutes<br>
  Jetstream · Add any city in the world
</footer>

<!-- Add Location Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-title">Add a Location</div>
    <div class="search-wrap">
      <input class="search-input" id="search-input" type="text" placeholder="Search city, e.g. Austin, TX…" oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
      <span class="search-icon">🔍</span>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-empty">Start typing to search any city worldwide</div>
    </div>
  </div>
</div>

<script>
// ── DEFAULTS ───────────────────────────────────────────────────────────────────
const DEFAULTS = [
  { name: "Eliot",        state: "ME", lat: 43.1437,  lon: -70.7800,  tz: "America/New_York",  unit: "fahrenheit", windUnit: "mph", precUnit: "inch", sym: "°F" },
  { name: "Ipswich",      state: "MA", lat: 42.6787,  lon: -70.8409,  tz: "America/New_York",  unit: "fahrenheit", windUnit: "mph", precUnit: "inch", sym: "°F" },
  { name: "Portland",     state: "ME", lat: 43.6591,  lon: -70.2568,  tz: "America/New_York",  unit: "fahrenheit", windUnit: "mph", precUnit: "inch", sym: "°F" },
  { name: "Williamstown", state: "VT", lat: 44.1214,  lon: -72.4537,  tz: "America/New_York",  unit: "fahrenheit", windUnit: "mph", precUnit: "inch", sym: "°F" },
  { name: "Scottsdale",   state: "AZ", lat: 33.4942,  lon: -111.9261, tz: "America/Phoenix",   unit: "fahrenheit", windUnit: "mph", precUnit: "inch", sym: "°F" },
  { name: "Hong Kong",    state: "",   lat: 22.3193,  lon: 114.1694,  tz: "Asia/Hong_Kong",    unit: "celsius",    windUnit: "kmh", precUnit: "mm",   sym: "°C" },
];

// ── PERSISTENT LOCATIONS ───────────────────────────────────────────────────────
function loadLocations() {
  try {
    const saved = localStorage.getItem('tornado_locations');
    return saved ? JSON.parse(saved) : [...DEFAULTS];
  } catch { return [...DEFAULTS]; }
}

function saveLocations() {
  try { localStorage.setItem('tornado_locations', JSON.stringify(LOCATIONS)); } catch {}
}

let LOCATIONS = loadLocations();

// ── WMO CODES ──────────────────────────────────────────────────────────────────
const WMO = {
  0:  { label: "Clear Sky",          icon: "☀️",  tint: "clear"  },
  1:  { label: "Mainly Clear",       icon: "🌤️", tint: "clear"  },
  2:  { label: "Partly Cloudy",      icon: "⛅",  tint: "cloudy" },
  3:  { label: "Overcast",           icon: "☁️",  tint: "cloudy" },
  45: { label: "Fog",                icon: "🌫️", tint: "foggy"  },
  48: { label: "Icy Fog",            icon: "🌫️", tint: "foggy"  },
  51: { label: "Light Drizzle",      icon: "🌦️", tint: "rainy"  },
  53: { label: "Drizzle",            icon: "🌦️", tint: "rainy"  },
  55: { label: "Heavy Drizzle",      icon: "🌧️", tint: "rainy"  },
  61: { label: "Light Rain",         icon: "🌧️", tint: "rainy"  },
  63: { label: "Rain",               icon: "🌧️", tint: "rainy"  },
  65: { label: "Heavy Rain",         icon: "🌧️", tint: "rainy"  },
  71: { label: "Light Snow",         icon: "🌨️", tint: "snowy"  },
  73: { label: "Snow",               icon: "❄️",  tint: "snowy"  },
  75: { label: "Heavy Snow",         icon: "❄️",  tint: "snowy"  },
  77: { label: "Snow Grains",        icon: "🌨️", tint: "snowy"  },
  80: { label: "Light Showers",      icon: "🌦️", tint: "rainy"  },
  81: { label: "Rain Showers",       icon: "🌧️", tint: "rainy"  },
  82: { label: "Heavy Showers",      icon: "⛈️", tint: "stormy" },
  85: { label: "Snow Showers",       icon: "🌨️", tint: "snowy"  },
  86: { label: "Heavy Snow Showers", icon: "❄️",  tint: "snowy"  },
  95: { label: "Thunderstorm",       icon: "⛈️", tint: "stormy" },
  96: { label: "T-Storm + Hail",     icon: "⛈️", tint: "stormy" },
  99: { label: "T-Storm + Hail",     icon: "⛈️", tint: "stormy" },
};

function wmo(code) { return WMO[code] || { label: "Unknown", icon: "🌡️", tint: "cloudy" }; }

function compass(deg) { return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8]; }
function arrow(deg)   { return ['↑','↗','→','↘','↓','↙','←','↖'][Math.round(deg/45)%8]; }
function localTime(tz){ return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:tz,hour12:true}); }
function localDate(tz){ return new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:tz}); }
function shortDay(ds, tz, isToday) {
  if (isToday) return 'Today';
  return new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', timeZone: tz });
}
function rv(v) { return (v !== null && v !== undefined) ? Math.round(v * 10) / 10 : '—'; }

// Summary pills state
const summaryData = {};

// ── BUILD INITIAL GRID ─────────────────────────────────────────────────────────
function buildGrid() {
  // Summary placeholders + Add button
  document.getElementById('summary-scroll').innerHTML = LOCATIONS.map((loc, i) => `
    <div class="summary-pill" id="sum-${i}" onclick="scrollToCard(${i})">
      <div class="sum-icon" id="sum-icon-${i}">🌡️</div>
      <div class="sum-info">
        <div class="sum-name">${loc.name}</div>
        <div class="sum-temp" id="sum-temp-${i}">—</div>
      </div>
    </div>
  `).join('') + `<button class="add-loc-btn" onclick="openModal()">＋ Add City</button>`;

  // Card skeletons
  document.getElementById('weather-grid').innerHTML = LOCATIONS.map((loc, i) => `
    <div class="card" id="card-${i}" style="animation-delay:${i * 70}ms">
      <div class="card-top">
        <div class="location-info">
          <div class="location-name">${loc.name}${loc.state ? ', ' + loc.state : ''}</div>
          <div class="location-meta" id="meta-${i}">${localTime(loc.tz)} · ${localDate(loc.tz)}</div>
        </div>
        <div class="card-weather-icon" id="icon-${i}">🌡️</div>
        <button class="remove-btn" onclick="removeLocation(${i})" title="Remove">✕</button>
      </div>
      <div id="body-${i}">
        <div class="skel-wrap">
          <div class="skel" style="height:64px;width:50%"></div>
          <div class="skel" style="height:14px;width:70%;margin-top:4px"></div>
          <div class="skel" style="height:12px;width:45%;margin-top:4px"></div>
        </div>
      </div>
    </div>
  `).join('');
}

function scrollToCard(i) {
  document.getElementById(`card-${i}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── RENDER CARD ────────────────────────────────────────────────────────────────
function renderCard(i, loc, data) {
  const c = data.current, daily = data.daily;
  const w = wmo(c.weather_code);
  const rain = (c.rain !== null && c.rain !== undefined) ? c.rain : (c.precipitation || 0);
  const pu = loc.precUnit === 'inch' ? 'in' : 'mm';
  const wu = loc.windUnit;

  // Update card tint
  const card = document.getElementById(`card-${i}`);
  if (card) { card.className = 'card ' + w.tint; card.style.animationDelay = (i * 70) + 'ms'; }

  // Update icon + meta
  const iconEl = document.getElementById(`icon-${i}`);
  if (iconEl) iconEl.textContent = w.icon;
  const metaEl = document.getElementById(`meta-${i}`);
  if (metaEl) metaEl.textContent = `${localTime(loc.tz)} · ${w.label}`;

  // Update summary pill
  const sumIcon = document.getElementById(`sum-icon-${i}`);
  const sumTemp = document.getElementById(`sum-temp-${i}`);
  if (sumIcon) sumIcon.textContent = w.icon;
  if (sumTemp) sumTemp.textContent = Math.round(c.temperature_2m) + loc.sym;

  // 7-day forecast
  const forecastHTML = Array.from({ length: Math.min(7, daily.time.length) }, (_, d) => {
    const dw = wmo(daily.weather_code[d]);
    const precip = daily.precipitation_sum[d];
    const hasRain = precip > (loc.precUnit === 'inch' ? 0.01 : 0.1);
    return `
      <div class="fc-day${d === 0 ? ' today' : ''}">
        <div class="fc-name">${shortDay(daily.time[d], loc.tz, d === 0)}</div>
        <div class="fc-icon">${dw.icon}</div>
        <div class="fc-hi">${Math.round(daily.temperature_2m_max[d])}°</div>
        <div class="fc-lo">${Math.round(daily.temperature_2m_min[d])}°</div>
        ${hasRain ? `<div class="fc-precip">${rv(precip)}${pu}</div>` : '<div class="fc-precip"> </div>'}
      </div>
    `;
  }).join('');

  const body = document.getElementById(`body-${i}`);
  if (!body) return;

  body.innerHTML = `
    <div class="temp-hero">
      <div class="temp-big">${Math.round(c.temperature_2m)}</div>
      <div class="temp-sym">${loc.sym}</div>
      <div class="temp-side">
        <div class="desc-text">${w.label}</div>
        <div class="feels-text">Feels like ${Math.round(c.apparent_temperature)}${loc.sym}</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-cell">
        <div class="sc-label">Humidity</div>
        <div class="sc-value">${c.relative_humidity_2m}<span class="sc-unit">%</span></div>
      </div>
      <div class="stat-cell">
        <div class="sc-label">Wind</div>
        <div class="sc-value">${Math.round(c.wind_speed_10m)}<span class="sc-unit"> ${wu}</span></div>
        <div class="sc-sub">${arrow(c.wind_direction_10m)} ${compass(c.wind_direction_10m)}</div>
      </div>
      <div class="stat-cell">
        <div class="sc-label">Gusts</div>
        <div class="sc-value">${Math.round(c.wind_gusts_10m)}<span class="sc-unit"> ${wu}</span></div>
        <div class="sc-sub">High ${Math.round(daily.wind_speed_10m_max[0])}</div>
      </div>
    </div>

    <div class="stats-row2">
      <div class="stat-cell">
        <div class="sc-label">Rain Now</div>
        <div class="sc-value">${rv(rain)}<span class="sc-unit"> ${pu}</span></div>
      </div>
      <div class="stat-cell">
        <div class="sc-label">Today Precip</div>
        <div class="sc-value">${rv(daily.precipitation_sum[0])}<span class="sc-unit"> ${pu}</span></div>
      </div>
    </div>

    <div class="forecast-section">
      <div class="forecast-label">7-Day Forecast</div>
      <div class="forecast-strip">${forecastHTML}</div>
    </div>
  `;
}

function renderError(i, msg) {
  const body = document.getElementById(`body-${i}`);
  if (body) body.innerHTML = `<div class="error-wrap"><div class="error-icon">⚠️</div><div class="error-text">${msg}</div></div>`;
}

// ── FETCH (staggered) ──────────────────────────────────────────────────────────
async function fetchWeather(loc, i) {
  await new Promise(res => setTimeout(res, i * 380));

  const params = new URLSearchParams({
    latitude:           loc.lat,
    longitude:          loc.lon,
    current:            'temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,rain,wind_speed_10m,wind_direction_10m,wind_gusts_10m,weather_code',
    daily:              'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max',
    temperature_unit:   loc.unit,
    wind_speed_unit:    loc.windUnit,
    precipitation_unit: loc.precUnit,
    timezone:           loc.tz,
    forecast_days:      7,
  });

  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
    if (!res.ok) throw new Error(`Error ${res.status}`);
    renderCard(i, loc, await res.json());
  } catch (err) {
    renderError(i, err.message);
  }
}

// ── COUNTDOWN ──────────────────────────────────────────────────────────────────
let countdownSec = 600, countdownTimer = null;

function startCountdown() {
  clearInterval(countdownTimer);
  countdownSec = 600;
  countdownTimer = setInterval(() => {
    countdownSec--;
    const m = Math.floor(countdownSec / 60), s = countdownSec % 60;
    const el = document.getElementById('countdown');
    if (el) el.textContent = `↺ ${m}:${String(s).padStart(2, '0')}`;
    if (countdownSec <= 0) refreshAll();
  }, 1000);
}

// ── REFRESH ────────────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  if (btn) btn.disabled = true;
  if (icon) { icon.textContent = '↺'; icon.classList.add('spin'); }

  buildGrid();
  await Promise.all(LOCATIONS.map((loc, i) => fetchWeather(loc, i)));

  const now = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  const u = document.getElementById('last-updated');
  if (u) u.textContent = `Updated ${now}`;

  if (btn) btn.disabled = false;
  if (icon) { icon.classList.remove('spin'); icon.textContent = '↺'; }

  startCountdown();
}

// ── REMOVE LOCATION ────────────────────────────────────────────────────────────
function removeLocation(i) {
  LOCATIONS.splice(i, 1);
  saveLocations();
  refreshAll();
}

// ── MODAL ──────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 300);
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '<div class="search-empty">Start typing to search any city worldwide</div>';
}

// ── GEOCODING ─────────────────────────────────────────────────────────────────
let searchTimer = null;

function onSearch(val) {
  clearTimeout(searchTimer);
  const q = val.trim();
  if (q.length < 2) {
    document.getElementById('search-results').innerHTML = '<div class="search-empty">Start typing to search any city worldwide</div>';
    return;
  }
  document.getElementById('search-results').innerHTML = '<div class="search-loading">Searching…</div>';
  searchTimer = setTimeout(() => geocode(q), 350);
}

async function geocode(q) {
  try {
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`);
    const data = await res.json();
    const results = data.results || [];
    if (!results.length) {
      document.getElementById('search-results').innerHTML = '<div class="search-empty">No results found — try a different spelling</div>';
      return;
    }
    document.getElementById('search-results').innerHTML = results.map((r, i) => {
      const isUS = r.country_code === 'US';
      const label = isUS ? `${r.admin1 || ''}, ${r.country_code}` : `${r.admin1 ? r.admin1 + ', ' : ''}${r.country}`;
      const unitLabel = isUS ? '°F' : '°C';
      return `
        <div class="search-result" onclick="addLocation(${i})">
          <div class="sr-icon">📍</div>
          <div>
            <div class="sr-name">${r.name}</div>
            <div class="sr-sub">${label}</div>
          </div>
          <div class="sr-unit">${unitLabel}</div>
        </div>
      `;
    }).join('');
    // Store results for click handler
    window._geoResults = results;
  } catch {
    document.getElementById('search-results').innerHTML = '<div class="search-empty">Search failed — check your connection</div>';
  }
}

function addLocation(i) {
  const r = window._geoResults[i];
  if (!r) return;

  // Check duplicate
  const dupe = LOCATIONS.some(l => Math.abs(l.lat - r.latitude) < 0.01 && Math.abs(l.lon - r.longitude) < 0.01);
  if (dupe) { closeModalBtn(); return; }

  const isUS = r.country_code === 'US';
  const loc = {
    name: r.name,
    state: isUS ? (r.admin1_id ? usStateAbbr(r.admin1) : '') : r.country_code,
    lat: r.latitude,
    lon: r.longitude,
    tz: r.timezone,
    unit: isUS ? 'fahrenheit' : 'celsius',
    windUnit: isUS ? 'mph' : 'kmh',
    precUnit: isUS ? 'inch' : 'mm',
    sym: isUS ? '°F' : '°C',
  };

  LOCATIONS.push(loc);
  saveLocations();
  closeModalBtn();
  refreshAll();
}

// US state name → abbreviation
function usStateAbbr(name) {
  const map = {
    'Alabama':'AL','Alaska':'AK','Arizona':'AZ','Arkansas':'AR','California':'CA',
    'Colorado':'CO','Connecticut':'CT','Delaware':'DE','Florida':'FL','Georgia':'GA',
    'Hawaii':'HI','Idaho':'ID','Illinois':'IL','Indiana':'IN','Iowa':'IA',
    'Kansas':'KS','Kentucky':'KY','Louisiana':'LA','Maine':'ME','Maryland':'MD',
    'Massachusetts':'MA','Michigan':'MI','Minnesota':'MN','Mississippi':'MS','Missouri':'MO',
    'Montana':'MT','Nebraska':'NE','Nevada':'NV','New Hampshire':'NH','New Jersey':'NJ',
    'New Mexico':'NM','New York':'NY','North Carolina':'NC','North Dakota':'ND','Ohio':'OH',
    'Oklahoma':'OK','Oregon':'OR','Pennsylvania':'PA','Rhode Island':'RI','South Carolina':'SC',
    'South Dakota':'SD','Tennessee':'TN','Texas':'TX','Utah':'UT','Vermont':'VT',
    'Virginia':'VA','Washington':'WA','West Virginia':'WV','Wisconsin':'WI','Wyoming':'WY',
  };
  return map[name] || name.slice(0,2).toUpperCase();
}

// ── INIT ───────────────────────────────────────────────────────────────────────
refreshAll();
</script>
