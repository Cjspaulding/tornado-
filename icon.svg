<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="shape">
      <rect width="512" height="512" rx="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="#0b2545"/>

  <!-- Sky gradient — slightly lighter at top, like overcast -->
  <rect width="512" height="512" rx="115" fill="url(#sky)" clip-path="url(#shape)"/>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a6b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0b2545" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- d monogram -->
  <text
    x="248"
    y="318"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="268"
    font-weight="400"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-4"
    opacity="0.96">d</text>

  <!-- Fog lines -->
  <line x1="88"  y1="368" x2="390" y2="368" stroke="rgba(255,255,255,0.28)" stroke-width="13" stroke-linecap="round"/>
  <line x1="112" y1="405" x2="355" y2="405" stroke="rgba(255,255,255,0.17)" stroke-width="10" stroke-linecap="round"/>
  <line x1="140" y1="438" x2="318" y2="438" stroke="rgba(255,255,255,0.09)" stroke-width="8"  stroke-linecap="round"/>

  <!-- Orange accent bar at bottom -->
  <rect x="0" y="468" width="512" height="44" fill="#c84b11" clip-path="url(#shape)"/>
</svg>
